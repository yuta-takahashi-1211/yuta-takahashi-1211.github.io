name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/cv.tex'
      - '.github/workflows/compile-cv.yml'
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/cv.tex
          latexmk_use_xelatex: true
          extra_system_packages: ""

      - name: Move PDF to files directory
        run: |
          mkdir -p files
          mv cv.pdf files/cv.pdf

      - name: Commit and push PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add files/cv.pdf
          if git diff --staged --quiet; then
            echo "No changes to cv.pdf; nothing to commit."
            exit 0
          fi
          git commit -m "Update CV PDF (compiled on $(date +'%Y-%m-%d'))"
          # The Japanese CV workflow may push to this same branch concurrently,
          # so rebase onto the latest remote and retry instead of failing.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed cv.pdf on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest remote and retrying..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 3))
          done
          echo "Failed to push cv.pdf after multiple attempts." >&2
          exit 1

      - name: Trigger GitHub Pages deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'master',
            });
