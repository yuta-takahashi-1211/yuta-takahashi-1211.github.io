name: Compile Japanese CV

on:
  push:
    paths:
      - 'cv/cv_ja.tex'
      - '.github/workflows/compile-cv-ja.yml'
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Japanese LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/cv_ja.tex
          latexmk_use_xelatex: true

      - name: Move PDF to files directory
        run: |
          mkdir -p files
          mv cv_ja.pdf files/cv_ja.pdf

      - name: Commit and push PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add files/cv_ja.pdf
          if git diff --staged --quiet; then
            echo "No changes to cv_ja.pdf; nothing to commit."
            exit 0
          fi
          git commit -m "Add Japanese CV PDF (compiled on $(date +'%Y-%m-%d'))"
          # The English CV workflow may push to this same branch concurrently,
          # so rebase onto the latest remote and retry instead of failing.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed cv_ja.pdf on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest remote and retrying..."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((attempt * 3))
          done
          echo "Failed to push cv_ja.pdf after multiple attempts." >&2
          exit 1
